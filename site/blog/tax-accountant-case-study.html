    h2_what_he_built: "他建了什麼？",
    section1: '<p>日本公認會計師畠山謙人最近在 X 上發了一篇長文，引起超過 200 萬次瀏覽。</p><p>他的事務所<strong>一個員工也沒有</strong>，卻服務著 <strong>60 家顧問公司</strong>。在業界常規中，這需要 6 名員工、每年超過 3,000 萬日圓的人事成本。他用 Claude Code 搭建了一套完整的自動化系統，<strong>每月省下超過 24 小時、全年約 300 小時</strong>的工作時間。</p><p>這是一個令人印象深刻的案例。但更有趣的是——他花了數月從零搭建的系統，幾乎完全對應 Tetora 已經開箱即用的功能。</p>',

    h2_insight: "為什麼「現場知識」才是核心",

    section1: '<p>公認会計士・税理士の畠山謙人氏が X に投稿した長文が、200 万回以上閲覧され大きな話題になりました。</p><p>畠山氏の事務所は<strong>従業員ゼロ</strong>。それでいて<strong>顧問先は 60 社</strong>。業界の相場では 6 名の人員と年間 3,000 万円以上の人件費が必要な規模です。Claude Code で構築した自動化システムにより、<strong>毎月 24 時間以上、年間約 300 時間</strong>の業務時間を削減しています。</p><p>素晴らしい事例ですが、さらに興味深いのは——畠山氏が数ヶ月かけてゼロから構築したシステムが、Tetora ですでに提供されている機能とほぼ完全に一致していることです。</p>',

    h2_what_he_built: "What He Built",
    section1: '<p>Japanese CPA and tax accountant Kento Hatakeyama recently published a long post on X that garnered over 2 million views.</p><p>His firm has <strong>zero employees</strong>, yet serves <strong>60 client companies</strong>. By industry standards, this workload requires 6 staff members and over 30 million yen (~$200K) in annual personnel costs. Using Claude Code, he built a comprehensive automation system that <strong>saves over 24 hours per month — roughly 300 hours per year</strong>.</p><p>It\'s an impressive case study. But what\'s even more interesting is that the system he spent months building from scratch maps almost perfectly to features Tetora already provides out of the box.</p>',
    section2: '<h3>1. Nightly Auto-Journaling — Two-Stage AI Classification</h3><p>A scheduled task runs at 21:00 every night, fetching unprocessed transaction records from the freee API for all 60 companies. Account classification uses a two-stage approach:</p><ul><li><strong>Stage 1: Keyword dictionary matching</strong> — 14 account categories, 100+ keywords each. Fast and zero API cost</li><li><strong>Stage 2: Claude API fallback</strong> — Only unmatched transactions go to AI. A confidence threshold filters low-confidence results for human review</li></ul><p>A mature design: don\'t waste AI on what rules can handle.</p><h3>2. Five Services Connected via MCP</h3><p>freee (accounting), Gmail, Google Calendar, Notion, Slack — all connected through MCP with Claude Code as the central orchestrator.</p><h3>3. Skills: Accumulating "Business Patterns"</h3><p>Repetitive business patterns defined as Claude Code Skills:</p><pre>/freee-check    → Check unprocessed entries\n/mtg-followup   → Post-meeting notes & action items\n/ipo-analysis   → Analyze newly listed companies</pre><p>The more you use them, the more Skills accumulate, the faster you work.</p><h3>4. CLAUDE.md as the Business Manual</h3><p>Journal entry rules, tax classifications, security policies, output paths, decision boundaries — all written into CLAUDE.md. A senior employee\'s SOP in a format AI can read.</p><h3>5. Automated Task Logging</h3><p>After each task: estimated manual time, actual AI time, and time saved are automatically logged. Monthly summaries are auto-generated.</p><h3>6. Multi-Company Data Isolation</h3><p>Data for all 60 companies is strictly isolated by company_id. Transaction details are logged only in company-specific log files.</p>',
    h2_comparison: "His Custom Build vs Tetora Out-of-the-Box",
    section3: '<table class="compare-table"><thead><tr><th>Hatakeyama\'s Custom System</th><th>Tetora Equivalent</th><th>Notes</th></tr></thead><tbody><tr><td>Nightly 21:00 scheduled execution</td><td><code>tetora job add --cron &quot;0 21 * * *&quot;</code></td><td>Built-in cron scheduler with full cron expression support</td></tr><tr><td>Claude Code Skills (/freee-check, etc.)</td><td><code>tetora skill</code> system</td><td>Slash-command triggered, with version management</td></tr><tr><td>CLAUDE.md business manual</td><td>SOUL.md + CLAUDE.md</td><td>Each agent gets its own personality and rule files</td></tr><tr><td>Task logs (manual vs AI time tracking)</td><td><code>tetora history</code> + Reflection</td><td>Auto-records cost, duration, and quality scores</td></tr><tr><td>MCP connections (freee/Gmail/Calendar)</td><td><code>tetora mcp add</code></td><td>Centralized MCP config, shared or per-agent</td></tr><tr><td>Multi-company data isolation (company_id)</td><td>Planned</td><td>Multi-tenant isolation in development</td></tr><tr><td>Two-stage AI classification (rules → AI fallback)</td><td>Definable in Workflow YAML</td><td>DAG workflows with conditional branching</td></tr></tbody></table><div class="highlight-box"><p><strong>The key difference:</strong> Hatakeyama spent months building schedulers, logging, and Skill management infrastructure from scratch. With Tetora, you skip all of that and <strong>start writing business logic immediately</strong>.</p></div>',
    h2_insight: "Why \"Field Knowledge\" Is the Real Core",
    section4: '<blockquote>What matters is knowing "what should be automated." The only person who can make that judgment is you — the one working on the ground every day.<br>— Kento Hatakeyama</blockquote><p>Hatakeyama emphasizes at the end of his post: it\'s precisely because he\'s not an engineer that Claude Code works so well. Tax accountants know the "business patterns" — journal entry rules, filing procedures, month-end checkpoints. This practical knowledge, accumulated over a decade, is something AI cannot generate on its own.</p><p>This is exactly Tetora\'s design philosophy.</p><p>Tetora doesn\'t require programming skills. What you need is <strong>domain knowledge</strong>:</p><ul><li>You know which processes can be standardized → Write them in <strong>Workflow YAML</strong></li><li>You know where the decision boundaries are → Write them in <strong>SOUL.md</strong></li><li>You know the repeating work patterns → Define them as <strong>Skills</strong></li><li>You know what to automate and what needs human eyes → Set the <strong>permission level</strong></li></ul><p>Engineers use AI to build "technically impressive things."<br>Professionals use AI to build "practically correct things."<br><strong>Tetora makes the latter possible — without building infrastructure from scratch.</strong></p>',

var LANGS = [
  {code:'zh-TW',label:'繁體中文'},
  {code:'ja',label:'日本語'},
  {code:'en',label:'English'}
];

function detectLang(){
  var saved = localStorage.getItem('tetora-lang');
  if(saved && I18N[saved]) return saved;
  var nav = (navigator.language||'').toLowerCase();
  if(nav.startsWith('zh')) return 'zh-TW';
  if(nav.startsWith('ja')) return 'ja';
  return 'en';
}

function setLang(code){
  var strings = I18N[code] || I18N['zh-TW'];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = strings[el.dataset.i18n] || '';
  });
  document.querySelectorAll('[data-i18n-html]').forEach(function(el){
    el.innerHTML = strings[el.dataset.i18nHtml] || '';
  });
  // Re-apply i18n inside dynamically inserted HTML (CTA box)
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    if(strings[el.dataset.i18n]) el.textContent = strings[el.dataset.i18n];
  });
  document.documentElement.lang = code;
  localStorage.setItem('tetora-lang', code);
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.lang === code);
  });
}

var bar = document.getElementById('lang-bar');
LANGS.forEach(function(l){
  var btn = document.createElement('button');
  btn.className = 'lang-btn';
  btn.dataset.lang = l.code;
  btn.textContent = l.label;
  btn.onclick = function(){ setLang(l.code); };
  bar.appendChild(btn);
});

setLang(detectLang());
</script>
