<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Tetora</title>
<meta name="description" content="案例分析、Release Notes、技術深度文">
<meta property="og:title" content="Blog — Tetora">
<meta property="og:description" content="案例分析、Release Notes、技術深度文">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tetora.dev/blog/">
<meta property="og:image" content="https://tetora.dev/banner.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="../logo-gem.png" type="image/png">
<!-- Google Analytics (replace G-X6YR7HG68N with your measurement ID) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-X6YR7HG68N"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-X6YR7HG68N');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;
  --text:#e4e4ef;--muted:#7a7a8e;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00cec9;--gradient:linear-gradient(135deg,#6c5ce7,#a29bfe,#00cec9);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.8;overflow-x:hidden}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

.lang-bar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:4px;padding:8px 12px;background:rgba(10,10,15,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);z-index:100;flex-wrap:wrap}
.lang-btn{background:none;border:1px solid transparent;color:var(--muted);font-size:12px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all 0.15s}
.lang-btn:hover{color:var(--text);border-color:var(--border)}
.lang-btn.active{color:var(--accent2);border-color:var(--accent)}

nav{padding:50px 20px 0;max-width:900px;margin:0 auto;font-size:13px;color:var(--muted)}
nav a{color:var(--muted)}
nav a:hover{color:var(--accent2)}

.hero{max-width:900px;margin:0 auto;padding:48px 20px 40px}
.hero h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;letter-spacing:-0.03em;line-height:1.2;margin-bottom:12px}
.hero h1 span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:15px}

.posts{max-width:900px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(2,1fr);gap:24px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;display:flex;flex-direction:column;gap:12px;transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 32px rgba(108,92,231,0.12)}

.card-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;width:fit-content}
.tag-case-study{background:rgba(0,206,201,0.12);color:var(--green);border:1px solid rgba(0,206,201,0.3)}
.tag-release{background:rgba(108,92,231,0.12);color:var(--accent2);border:1px solid rgba(108,92,231,0.3)}

.card h3{font-size:1.05rem;font-weight:700;line-height:1.4;color:var(--text)}
.card h3 a{color:var(--text)}
.card h3 a:hover{color:var(--accent2);text-decoration:none}

.card-meta{font-size:12px;color:var(--muted)}

.card-excerpt{font-size:14px;color:var(--muted);line-height:1.65;flex:1}

.card-read{font-size:13px;font-weight:600;color:var(--accent2);margin-top:4px}
.card-read:hover{text-decoration:underline}

footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
footer a{color:var(--muted)}
footer a:hover{color:var(--accent2)}

@media(max-width:768px){
  .posts{grid-template-columns:1fr}
}
@media(max-width:600px){
  .hero{padding:36px 16px 28px}
  .posts{padding:0 16px 60px}
  .lang-bar{gap:2px;padding:6px 8px}
  .lang-btn{font-size:11px;padding:2px 6px}
}
</style>
</head>
<body>

<div class="lang-bar" id="lang-bar"></div>

<nav>
  <a href="../">&larr; Tetora</a> &nbsp;/&nbsp; <span data-i18n="nav_blog">Blog</span>
</nav>

<div class="hero">
  <h1><span data-i18n="hero_title">Blog</span></h1>
  <p data-i18n="hero_subtitle">案例分析、Release Notes、技術深度文</p>
</div>

<div class="posts" id="posts-grid"></div>

<footer>
  <p>
    <a href="../">Tetora</a> &middot;
    <a href="https://github.com/TakumaLee/Tetora">GitHub</a> &middot;
    <a href="https://github.com/TakumaLee/Tetora/releases">Releases</a>
  </p>
  <p style="margin-top:8px">Built by <a href="https://github.com/TakumaLee">Takuma</a> &amp; the 宝石團</p>
</footer>

<script>
var POSTS = [
  {
    url: "tax-accountant-case-study.html",
    tag: "case-study",
    date: "2026-03-18",
    readTime: { "zh-TW": "約 8 分鐘", ja: "約 8 分", en: "~8 min" },
    title: {
      "zh-TW": "0 員工、60 家客戶——日本稅務師的 AI 自動化",
      ja: "従業員 0 人、顧問先 60 社——AI 税理士事務所の自動化",
      en: "0 Employees, 60 Clients — A Japanese Tax Accountant's AI Automation"
    },
    excerpt: {
      "zh-TW": "日本稅務師畠山謙人用 Claude Code 一人服務 60 家公司。他花數月搭建的系統，Tetora 開箱即用。",
      ja: "公認会計士の畠山謙人氏が数ヶ月かけて構築した自動化システムは、Tetora ですでに標準機能として提供されていた。",
      en: "Japanese CPA Kento Hatakeyama serves 60 companies solo with Claude Code. The system he spent months building maps perfectly to Tetora's out-of-the-box features."
    }
  },
  {
    url: "v2-1-0-release.html",
    tag: "release",
    date: "2026-03-18",
    readTime: { "zh-TW": "約 5 分鐘", ja: "約 5 分", en: "~5 min" },
    title: {
      "zh-TW": "Tetora v2.1.0 — 大規模程式碼整合 + Workflow Engine",
      ja: "Tetora v2.1.0 — 大規模コード統合 + Workflow Engine",
      en: "Tetora v2.1.0 — Massive Code Consolidation + Workflow Engine"
    },
    excerpt: {
      "zh-TW": "256 檔案精簡為精簡核心、全新 Workflow Engine 支援 DAG 工作流、Template Marketplace。",
      ja: "256 ファイルの大幅統合、DAG ワークフローエンジン、テンプレートマーケットプレイスを搭載。",
      en: "256 files consolidated to a lean core. New Workflow Engine with DAG support and Template Marketplace."
    }
  }
];

var TAG_LABELS = {
  "case-study": { "zh-TW": "案例分析", ja: "ケーススタディ", en: "Case Study" },
  "release":    { "zh-TW": "Release",  ja: "リリース",       en: "Release" }
};

var I18N = {
  "zh-TW": {
    nav_blog:     "Blog",
    hero_title:   "Blog",
    hero_subtitle:"案例分析、Release Notes、技術深度文",
    read_more:    "閱讀全文 →"
  },
  ja: {
    nav_blog:     "ブログ",
    hero_title:   "ブログ",
    hero_subtitle:"事例分析・リリースノート・技術解説",
    read_more:    "続きを読む →"
  },
  en: {
    nav_blog:     "Blog",
    hero_title:   "Blog",
    hero_subtitle:"Case Studies, Release Notes & Technical Deep-Dives",
    read_more:    "Read →"
  }
};

var LANGS = [
  {code:'zh-TW',label:'繁體中文'},
  {code:'ja',   label:'日本語'},
  {code:'en',   label:'English'}
];

function detectLang(){
  var saved = localStorage.getItem('tetora-lang');
  if(saved && I18N[saved]) return saved;
  var nav = (navigator.language||'').toLowerCase();
  if(nav.startsWith('zh')) return 'zh-TW';
  if(nav.startsWith('ja')) return 'ja';
  return 'en';
}

function renderPosts(lang){
  var grid = document.getElementById('posts-grid');
  var strings = I18N[lang];
  grid.innerHTML = '';
  POSTS.forEach(function(post){
    var tagClass = post.tag === 'case-study' ? 'tag-case-study' : 'tag-release';
    var tagLabel = TAG_LABELS[post.tag][lang] || TAG_LABELS[post.tag]['en'];
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<span class="card-tag ' + tagClass + '">' + tagLabel + '</span>' +
      '<h3><a href="' + post.url + '">' + post.title[lang] + '</a></h3>' +
      '<div class="card-meta">' + post.date + ' &middot; ' + post.readTime[lang] + '</div>' +
      '<p class="card-excerpt">' + post.excerpt[lang] + '</p>' +
      '<a class="card-read" href="' + post.url + '">' + strings.read_more + '</a>';
    grid.appendChild(card);
  });
}

function setLang(code){
  var strings = I18N[code] || I18N['zh-TW'];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = strings[el.dataset.i18n] || '';
  });
  document.documentElement.lang = code;
  localStorage.setItem('tetora-lang', code);
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.lang === code);
  });
  renderPosts(code);
}

var bar = document.getElementById('lang-bar');
LANGS.forEach(function(l){
  var btn = document.createElement('button');
  btn.className = 'lang-btn';
  btn.dataset.lang = l.code;
  btn.textContent = l.label;
  btn.onclick = function(){ setLang(l.code); };
  bar.appendChild(btn);
});

setLang(detectLang());
</script>
</body>
</html>
